<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SkyFlap Fullscreen</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #222;
        height: 100%;
        width: 100%;
    }
    canvas {
        display: block;
        background: linear-gradient(#4ec0ca, #ffffff);
    }
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    // Game constants (scaled to screen)
    let CW = () => canvas.width;
    let CH = () => canvas.height;

    const Gravity = 0.05;
    const JumpStrength = -3.5;
    const InitialPipeSpeed = 1.8;
    const InitialSpawnRate = 240;
    const PipeGap = 200;
    const BirdSize = 35;

    const GameState = { Start: 0, Playing: 1, GameOver: 2 };

    class Pipe {
        constructor(x, topHeight) {
            this.x = x;
            this.topHeight = topHeight;
            this.width = 80;
            this.passed = false;
        }
    }

    class SkyFlap {
        constructor() {
            this.state = GameState.Start;
            this.reset();
        }

        reset() {
            this.birdY = CH() / 2;
            this.birdVel = 0;
            this.pipes = [];
            this.frame = 0;
            this.score = 0;
            this.high = this.high || 0;
            this.pipeSpeed = InitialPipeSpeed;
            this.spawnRate = InitialSpawnRate;
            this.wingFlap = 0;
        }

        jump() {
            if (this.state === GameState.Start) {
                this.state = GameState.Playing;
                this.birdVel = JumpStrength;
                this.wingFlap = 1;
            } else if (this.state === GameState.Playing) {
                this.birdVel = JumpStrength;
                this.wingFlap = 1;
            } else {
                this.reset();
                this.state = GameState.Playing;
            }
        }

        update() {
            if (this.state !== GameState.Playing) return;

            if (this.wingFlap > 0) {
                this.wingFlap = Math.max(0, this.wingFlap - 0.05);
            }

            this.birdVel += Gravity;
            this.birdY += this.birdVel;

            // Difficulty scaling
            const speedBonus = Math.floor(this.score / 5) * 0.03;
            this.pipeSpeed = InitialPipeSpeed + speedBonus;

            const targetDist = InitialPipeSpeed * InitialSpawnRate;
            this.spawnRate = Math.max(60, Math.floor(targetDist / this.pipeSpeed));

            // Ground / ceiling (using bird center and radius)
            const birdTop = this.birdY - BirdSize / 2;
            const birdBottom = this.birdY + BirdSize / 2;
            if (birdTop < 0 || birdBottom > CH()) {
                this.end();
            }

            // Spawn pipes
            this.frame++;
            if (this.frame >= this.spawnRate) {
                this.frame = 0;
                this.spawnPipe();
            }

            // Move pipes
            for (let i = this.pipes.length - 1; i >= 0; i--) {
                const p = this.pipes[i];
                p.x -= this.pipeSpeed;

                if (this.checkCollision(p)) this.end();

                const birdLeft = CW() * 0.25 - BirdSize / 2;
                if (!p.passed && p.x + p.width < birdLeft) {
                    p.passed = true;
                    this.score++;
                    if (this.score > this.high) this.high = this.score;
                }

                if (p.x + p.width < 0) this.pipes.splice(i, 1);
            }
        }

        spawnPipe() {
            const minH = 50;
            const maxH = CH() - PipeGap - minH;
            const top = Math.random() * (maxH - minH) + minH;
            this.pipes.push(new Pipe(CW(), top));
        }

        checkCollision(p) {
            const birdX = CW() * 0.25;
            const birdLeft = birdX - BirdSize / 2;
            const birdRight = birdX + BirdSize / 2;
            const birdTop = this.birdY - BirdSize / 2;
            const birdBottom = this.birdY + BirdSize / 2;

            if (birdRight > p.x && birdLeft < p.x + p.width) {
                if (birdTop < p.topHeight || birdBottom > p.topHeight + PipeGap) {
                    return true;
                }
            }
            return false;
        }

        end() {
            this.state = GameState.GameOver;
        }
    }

    const game = new SkyFlap();

    function draw() {
        ctx.clearRect(0, 0, CW(), CH());

        // Pipes
        ctx.fillStyle = "#3cba54";
        for (const p of game.pipes) {
            ctx.fillRect(p.x, 0, p.width, p.topHeight);
            ctx.fillRect(p.x, p.topHeight + PipeGap, p.width, CH() - (p.topHeight + PipeGap));
        }

        // Bird
        const birdX = CW() * 0.25;
        const birdR = BirdSize / 2;
        const tilt = Math.max(-0.8, Math.min(0.8, game.birdVel * 0.1));

        ctx.save();
        ctx.translate(birdX, game.birdY);
        ctx.rotate(tilt);

        // Body
        ctx.fillStyle = "#ffeb3b";
        ctx.strokeStyle = "#b38f1f";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(0, 0, birdR, birdR * 0.9, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        // Wing
        const flap = Math.min(Math.max(game.wingFlap, 0), 1);
        const wingBaseY = 0;
        const wingCpY = wingBaseY - birdR * (0.7 - flap * 0.2);
        const wingTipY = wingBaseY + birdR * (0.12 - flap * 0.25);

        ctx.fillStyle = "#f8c31c";
        ctx.beginPath();
        ctx.moveTo(-birdR * 0.2, wingBaseY);
        ctx.quadraticCurveTo(birdR * 0.2, wingCpY, birdR * 0.65, wingTipY);
        ctx.lineTo(birdR * 0.45, wingBaseY + birdR * 0.1);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        // Beak
        ctx.fillStyle = "#ff8a00";
        ctx.strokeStyle = "#a05100";
        ctx.beginPath();
        ctx.moveTo(birdR * 0.8, -birdR * 0.1);
        ctx.lineTo(birdR * 1.35, 0);
        ctx.lineTo(birdR * 0.8, birdR * 0.15);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        // Eye
        const eyeX = birdR * 0.35;
        const eyeY = -birdR * 0.3;
        ctx.fillStyle = "#fff";
        ctx.beginPath();
        ctx.arc(eyeX, eyeY, birdR * 0.22, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "#000";
        ctx.beginPath();
        ctx.arc(eyeX + birdR * 0.05, eyeY, birdR * 0.1, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();

        // Score
        ctx.fillStyle = "#fff";
        ctx.font = "32px Arial";
        ctx.fillText("Score: " + game.score, 20, 40);
        ctx.fillText("High: " + game.high, 20, 80);

        if (game.state === GameState.Start) {
            ctx.fillStyle = "rgba(0,0,0,0.5)";
            ctx.fillRect(0, 0, CW(), CH());
            ctx.fillStyle = "#fff";
            ctx.font = "48px Arial";
            ctx.textAlign = "center";
            ctx.fillText("SkyFlap", CW() / 2, CH() / 2 - 40);
            ctx.font = "24px Arial";
            ctx.fillText("Press Space or Click to Start", CW() / 2, CH() / 2 + 20);
            ctx.textAlign = "start";
        }

        if (game.state === GameState.GameOver) {
            ctx.fillStyle = "rgba(0,0,0,0.5)";
            ctx.fillRect(0, 0, CW(), CH());
            ctx.fillStyle = "#fff";
            ctx.font = "48px Arial";
            ctx.textAlign = "center";
            ctx.fillText("Game Over", CW() / 2, CH() / 2 - 20);
            ctx.font = "24px Arial";
            ctx.fillText("Tap / Click / Space to restart", CW() / 2, CH() / 2 + 20);
            ctx.textAlign = "start";
        }
    }

    function loop() {
        game.update();
        draw();
        requestAnimationFrame(loop);
    }

    // Controls
    function flap() {
        if (game.state === GameState.GameOver) game.reset();
        else game.jump();
    }

    window.addEventListener("keydown", e => {
        if (e.code === "Space") flap();
    });

    canvas.addEventListener("mousedown", flap);
    canvas.addEventListener("touchstart", flap);

    loop();
</script>

</body>
</html>
