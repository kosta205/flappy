<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { background: #70c5ce; display: block; margin: 0 auto; }
        #score { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-size: 30px; color: white; }
    </style>
</head>
<body>
    <div id="score">Score: 0</div>
    <canvas id="canvas" width="320" height="480"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let bird = { x: 50, y: 150, width: 20, height: 20, gravity: 0.05, lift: 1.4, velocity: 0 };
        let pipes = [];  
        let score = 0;

        function setup() {
            pipes.push({ x: canvas.width, y: 0, width: 20, height: Math.random() * canvas.height / 2 });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'green';
            pipes.forEach(pipe => {
                ctx.fillRect(pipe.x, pipe.y, pipe.width, pipe.height);
                ctx.fillRect(pipe.x, pipe.height + 100, pipe.width, canvas.height - pipe.height - 100);
            });
            ctx.fillStyle = 'yellow';
            ctx.fillRect(bird.x, bird.y, bird.width, bird.height);
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;

            document.getElementById('score').innerText = 'Score: ' + score;

            pipes.forEach(pipe => {
                pipe.x -= 2;
                if (pipe.x < 0) {
                    pipes.splice(pipes.indexOf(pipe), 1);
                }
                if (pipe.x === bird.x + bird.width) {
                    score++; // Increase score if bird passes through the pipe
                }
            });
            requestAnimationFrame(draw);
        }

        function flap() {
            bird.velocity += bird.lift;
        }

        document.addEventListener('keydown', flap);
        setup();
        draw();
    </script>
</body>
</html>
