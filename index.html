<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<title>Flappy Bird</title>
<style>
  body { margin: 0; overflow: hidden; background: skyblue; }
  canvas { display: block; margin: auto; background: lightblue; }
  #restart {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 20px;
    padding: 10px 20px;
    cursor: pointer;
  }
</style>
</head>
<body>

<canvas id="game" width="400" height="600"></canvas>
<button id="restart">Restart</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let bird;
let pipes;
let score;
let gameOver;
let speed;
let started;
let gravity = 0.05; // slower fall
let jumpStrength = 1.4;
let jumpFrames = 20;
let jumpCounter = 0;

function init() {
  bird = { 
    x: 50, 
    y: canvas.height / 2,
    velocity: 0 
  };
  pipes = [];
  score = 0;
  gameOver = false;
  speed = 0.8;
  started = false;
  jumpCounter = 0;
}

init();

// Click to jump
document.addEventListener("click", () => {
  if (!started) {
    started = true;
    jumpCounter = jumpFrames; // start first jump
    return;
  }

  if (!gameOver) {
    jumpCounter = jumpFrames; // trigger jump
  }
});

// Restart button
document.getElementById("restart").addEventListener("click", () => {
  init();
  document.getElementById("restart").style.display = "none";
});

function drawBird() {
  ctx.fillStyle = "yellow";
  ctx.fillRect(bird.x, bird.y, 20, 20);
}

function drawPipes() {
  ctx.fillStyle = "green";
  pipes.forEach(p => {
    ctx.fillRect(p.x, 0, 50, p.top);
    ctx.fillRect(p.x, p.bottom, 50, canvas.height);
  });
}

function update() {
  if (!started || gameOver) return;

  // Jump physics
  if (jumpCounter > 0) {
    bird.velocity = -jumpStrength;
    jumpCounter--;
  } else {
    bird.velocity += gravity;
  }
  bird.y += bird.velocity;

  // Generate pipes
  if (pipes.length === 0 || pipes[pipes.length - 1].x < canvas.width - 200) {
    let gap = 150;
    let top = Math.random() * (canvas.height - gap - 100) + 50;

    pipes.push({
      x: canvas.width,
      top: top,
      bottom: top + gap
    });
  }

  // Move pipes
  pipes.forEach(p => p.x -= speed);

  // Collision detection
  pipes.forEach(p => {
    if (
      bird.x < p.x + 50 &&
      bird.x + 20 > p.x &&
      (bird.y < p.top || bird.y + 20 > p.bottom)
    ) {
      gameOver = true;
      document.getElementById("restart").style.display = "block";
    }
  });

  // Remove off-screen pipes
  pipes = pipes.filter(p => p.x > -50);

  score++;
  speed += 0.00000005; // gradually faster
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawBird();
  drawPipes();

  ctx.fillStyle = "black";
  ctx.font = "20px Arial";

  if (!started) {
    ctx.font = "30px Arial";
    ctx.fillText("Click to start", 110, 300);
  } else {
    ctx.fillText("Score: " + score, 10, 30);
  }

  if (gameOver) {
    ctx.font = "30px Arial";
    ctx.fillText("Game Over", 120, 250);
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
